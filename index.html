<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Master | JS Loops</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>📋 Task Master</h1>
      <p class="subtitle">
        Add tasks – they appear instantly using a <strong>loop</strong>
      </p>

      <div class="input-group">
        <input
          type="text"
          id="taskInput"
          placeholder="e.g., Learn JavaScript loops"
          autocomplete="off"
        />
        <button id="addButton">+ Add Task</button>
      </div>

      <div class="task-list-container">
        <h2>Your Tasks (<span id="taskCount">0</span>)</h2>
        <ul id="taskList">
          <li class="placeholder-message">✨ No tasks yet. Add one above!</li>
        </ul>
      </div>

      <button id="clearAllButton" class="secondary">Clear All Tasks</button>
    </main>
    <script src="script/main.js"></script>
  </body>
</html>
